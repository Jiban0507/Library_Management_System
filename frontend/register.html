<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1 class="page-title">Create an account</h1>
        <p class="page-subtitle">
          Sign up to start managing books and transactions.
        </p>
      </header>

      <form id="register-form">
        <div>
          <label for="name">Full name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your name"
            required
          />
        </div>

        <div>
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div>
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            minlength="6"
            required
          />
        </div>

        <div>
          <label for="role">Role (optional)</label>
          <select id="role" name="role">
            <option value="">Member (default)</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Register</button>
          <span class="link-inline" onclick="window.location.href='login.html'">
            Already have an account? Log in
          </span>
        </div>
      </form>

      <div id="register-error" class="alert alert-error hidden"></div>
      <div id="register-success" class="alert alert-success hidden"></div>
    </main>

    <script src="script.js"></script>
    <script>
      document
        .getElementById("register-form")
        .addEventListener("submit", handleRegister);
    </script>
  </body>
  </html>
